<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey Rahad | Digital Presence</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { font-size: 2.5rem; color: #38bdf8; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 25px; }
        .btn {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hey Rahad</h1>
        <p>ডিজিটাল স্কিলস শিখুন এবং নিজের ক্যারিয়ার গড়ুন।</p>
        <a href="#" class="btn">Explore More</a>
    </div>
</body>
</html>
