<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey Rahad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s; }
        body { background-color: #030712; color: #f8fafc; font-family: sans-serif; padding-bottom: 90px; }
        
        .dark-mode { background-color: #ffffff; color: #030712; }
        header { display: flex; align-items: center; padding: 20px; justify-content: space-between; }
        
        .hero { text-align: center; padding: 40px 20px; }
        .hero h1 { color: #38bdf8; font-size: 2.2rem; margin-bottom: 10px; }
        
        .action-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn { padding: 12px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .btn-learn { background: #38bdf8; color: #000; }
        .btn-watch { background: #1e293b; color: #fff; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #090d16; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #1e293b; }
        .nav-item { color: #64748b; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; font-size: 1.2rem;">Hey Rahad</div>
        <i class="fa-solid fa-moon" onclick="document.body.classList.toggle('dark-mode')" style="cursor:pointer; font-size: 1.2rem;"></i>
    </header>

    <div class="hero">
        <h1>Build Your Future</h1>
        <p>With Rahad • Learn • Build • Grow</p>
        
        <div class="action-btns">
            <a href="#" class="btn btn-learn">Start Learning</a>
            <a href="#" class="btn btn-watch">Watch Videos</a>
        </div>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
        <a href="videos.html" class="nav-item"><i class="fa-solid fa-circle-play"></i> Videos</a>
        <a href="about.html" class="nav-item"><i class="fa-solid fa-user"></i> About</a>
        <a href="contact.html" class="nav-item"><i class="fa-solid fa-envelope"></i> Contact</a>
    </div>

</body>
</html>
