<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hey Rahad</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<header class="navbar">

    <div class="logo">
        <i class="fas fa-robot"></i>
        <span>Hey Rahad</span>
    </div>

    <div class="icons">
        <i class="fas fa-search"></i>
        <i class="fas fa-moon"></i>
    </div>

</header>

<section class="hero">

    <h1>
        Build Your <br>
        <span>Future</span>
    </h1>

    <p class="subtitle">
        Learn • Build • Grow
    </p>

    <p class="description">
        Discover self-improvement, study strategies, business ideas, AI tools and practical knowledge to build a better future.
    </p>

    <div class="buttons">

        <a href="#" class="btn primary">
            <i class="fas fa-graduation-cap"></i>
            Start Learning
        </a>

        <a href="#" class="btn secondary">
            <i class="fas fa-play"></i>
            Watch Videos
        </a>

    </div>

</html>
