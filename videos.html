<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos | Hey Rahad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #030712; color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        
        /* টপ হেডার (হোমপেজের মতই) */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #030712; border-bottom: 1px solid #1e293b; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.2rem; color: #94a3b8; cursor: pointer; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.2rem; color: #ffffff; }
        .logo i { color: #38bdf8; font-size: 1.4rem; }

        /* পেজের টাইটেল */
        .page-header { padding: 30px 20px; text-align: center; }
        .page-header h1 { font-size: 2rem; color: #fff; margin-bottom: 10px; }
        .page-header h1 span { color: #3b82f6; }
        .page-header p { color: #94a3b8; font-size: 0.95rem; }

        /* ভিডিও গ্যালারি */
        .video-gallery { padding: 0 20px 40px 20px; display: flex; flex-direction: column; gap: 20px; }
        .video-card { background: #0f172a; border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; }
        
        /* ইউটিউব ভিডিও বসানোর জায়গা (16:9 রেশিও) */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #1e293b; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .video-info { padding: 15px; }
        .video-info h3 { font-size: 1.1rem; color: #fff; margin-bottom: 8px; line-height: 1.3; }
        .video-info p { font-size: 0.85rem; color: #64748b; }

        /* বটম মোবাইল ন্যাভিগেশন বার */
        .bottom-navigation {
            position: fixed; bottom: 0; left: 0; width: 100%; background-color: #090d16;
            border-top: 1px solid #1e293b; display: flex; justify-content: space-around; padding: 12px 0; z-index: 10;
        }
        .nav-item { text-align: center; color: #64748b; text-decoration: none; font-size: 0.75rem; display: flex; flex-direction: column; gap: 4px; }
        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { color: #3b82f6; } /* এখানে Videos বাটনটি নীল থাকবে */
    </style>
</head>
<body>

    <!-- টপ বার -->
    <header>
        <div class="header-left">
            <i class="fa-solid fa-arrow-left menu-icon" onclick="history.back()"></i> <!-- ব্যাক বাটন -->
            <div class="logo"><i class="fa-solid fa-robot"></i> Hey Rahad</div>
        </div>
    </header>

    <!-- পেজ টাইটেল -->
    <div class="page-header">
        <h1>My <span>Masterclass</span></h1>
        <p>Explore my latest AI creations and educational videos.</p>
    </div>

    <!-- ভিডিও গ্যালারি -->
    <div class="video-gallery">
        
        <!-- ভিডিও কার্ড ১ -->
        <div class="video-card">
            <div class="video-wrapper">
                <!-- এখানে আপনার ইউটিউব ভিডিওর লিংক বসবে -->
                <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>Advanced AI Video Editing Tutorial</h3>
                <p>Learn how to create stunning visuals using AI tools.</p>
            </div>
        </div>

        <!-- ভিডিও কার্ড ২ -->
        <div class="video-card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>Grow Your Social Media Audience</h3>
                <p>Tips and tricks to increase engagement on your platforms.</p>
            </div>
        </div>

    </div>

    <!-- বটম মেনু বার -->
    <div class="bottom-navigation">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="videos.html" class="nav-item active"> <!-- Videos অ্যাক্টিভ করা হয়েছে -->
            <i class="fa-solid fa-circle-play"></i>
            <span>Videos</span>
        </a>
        <a href="blog.html" class="nav-item">
            <i class="fa-solid fa-newspaper"></i>
            <span>Blog</span>
        </a>
        <a href="about.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>About</span>
        </a>
        <a href="contact.html" class="nav-item">
            <i class="fa-solid fa-envelope"></i>
            <span>Contact</span>
        </a>
    </div>
<script src="script.js"></script>

</body>
</html>
