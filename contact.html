<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hey Rahad</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding: 40px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 15px; }
        h1 { color: #38bdf8; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #38bdf8; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Me</h1>
        <p>আপনার কোনো প্রশ্ন থাকলে বা যোগাযোগ করতে চাইলে নিচে মেসেজ দিন।</p>
        <form>
            <input type="text" placeholder="আপনার নাম" required>
            <input type="email" placeholder="আপনার ইমেইল" required>
            <textarea placeholder="আপনার মেসেজ" rows="5"></textarea>
            <button type="submit">পাঠান</button>
        </form>
        <br>
        <a href="index.html" style="color: #38bdf8;">Back to Home</a>
    </div>
</body>
</html>
