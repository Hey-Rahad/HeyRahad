<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Hey Rahad</title>
    <!-- ফন্ট অসাম আইকন -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #030712; color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        
        /* টপ হেডার */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #030712; border-bottom: 1px solid #1e293b; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-icon { font-size: 1.2rem; color: #94a3b8; cursor: pointer; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 1.2rem; color: #ffffff; }
        .logo i { color: #38bdf8; font-size: 1.4rem; }

        /* পেজের টাইটেল */
        .page-header { padding: 30px 20px; text-align: center; }
        .page-header h1 { font-size: 2rem; color: #fff; margin-bottom: 10px; }
        .page-header h1 span { color: #3b82f6; }
        .page-header p { color: #94a3b8; font-size: 0.95rem; }

        /* কন্টাক্ট ইনফরমেশন বক্স */
        .contact-info-container { padding: 0 20px 20px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .info-box { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; text-align: center; }
        .info-box i { font-size: 1.5rem; color: #38bdf8; margin-bottom: 10px; }
        .info-box h3 { font-size: 1rem; color: #ffffff; margin-bottom: 5px; }
        .info-box p { font-size: 0.8rem; color: #94a3b8; }

        /* মেসেজ ফর্ম */
        .contact-form-section { padding: 0 20px 40px 20px; }
        .form-container { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; }
        .form-container h2 { font-size: 1.3rem; color: #ffffff; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .form-container h2 i { color: #3b82f6; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
        .input-group input, .input-group textarea {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: #3b82f6; box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
        .input-group textarea { resize: vertical; min-height: 120px; }
        
        .submit-btn {
            width: 100%;
            background: #2563eb;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #1d4ed8; }

        /* বটম মোবাইল ন্যাভিগেশন বার */
        .bottom-navigation {
            position: fixed; bottom: 0; left: 0; width: 100%; background-color: #090d16;
            border-top: 1px solid #1e293b; display: flex; justify-content: space-around; padding: 12px 0; z-index: 10;
        }
        .nav-item { text-align: center; color: #64748b; text-decoration: none; font-size: 0.75rem; display: flex; flex-direction: column; gap: 4px; }
        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { color: #3b82f6; } /* Contact বাটনটি নীল থাকবে */
    </style>
</head>
<body>

    <!-- টপ বার -->
    <header>
        <div class="header-left">
            <i class="fa-solid fa-arrow-left menu-icon" onclick="history.back()"></i>
            <div class="logo"><i class="fa-solid fa-robot"></i> Hey Rahad</div>
        </div>
    </header>

    <!-- পেজ টাইটেল -->
    <div class="page-header">
        <h1>Get in <span>Touch</span></h1>
        <p>Have a question or want to work together? Drop a message!</p>
    </div>

    <!-- কন্টাক্ট ইনফো -->
    <div class="contact-info-container">
        <div class="info-box">
            <i class="fa-regular fa-envelope"></i>
            <h3>Email</h3>
            <p>hello@heyrahad.com</p>
        </div>
        <div class="info-box">
            <i class="fa-solid fa-location-dot"></i>
            <h3>Location</h3>
            <p>Dhaka, BD</p>
        </div>
    </div>

    <!-- কন্টাক্ট ফর্ম -->
    <div class="contact-form-section">
        <div class="form-container">
            <h2><i class="fa-regular fa-paper-plane"></i> Send a Message</h2>
            <form action="#" method="POST">
                <div class="input-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="How can I help you?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message <i class="fa-solid fa-arrow-right"></i></button>
            </form>
        </div>
    </div>

    <!-- বটম মেনু বার -->
    <div class="bottom-navigation">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="videos.html" class="nav-item">
            <i class="fa-solid fa-circle-play"></i>
            <span>Videos</span>
        </a>
        <a href="blog.html" class="nav-item">
            <i class="fa-solid fa-newspaper"></i>
            <span>Blog</span>
        </a>
        <a href="about.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>About</span>
        </a>
        <a href="contact.html" class="nav-item active"> <!-- Contact অ্যাক্টিভ করা হয়েছে -->
            <i class="fa-solid fa-envelope"></i>
            <span>Contact</span>
        </a>
    </div>
<script src="script.js"></script>

</body>
</html>
